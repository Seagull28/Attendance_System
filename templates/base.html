{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/main.js' %}"></script>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <style>
        :root {
            --primary-color: #1a2f50;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --light-bg: #e6f2fa;
            --table-header-bg: #1a2f50;
            --border-color: #dee2e6;
        }

        body {
            background-color: var(--light-bg);
            font-family: 'Nunito', sans-serif;
        }

        .card {
            border: none;
            border-radius: 0.5rem;
            box-shadow: 0 0.15rem 1.75rem rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease-in-out;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card-header {
            background-color: white;
            border-bottom: 1px solid var(--border-color);
        }

        .table th {
            font-weight: 600;
            color: #fff;
            background-color: var(--table-header-bg);
            border-bottom-width: 1px;
        }

        .badge {
            padding: 0.5rem 1rem;
            font-weight: 600;
            border-radius: 0.5rem;
        }

        .btn {
            border-radius: 0.25rem;
            padding: 0.5rem 1.25rem;
            font-weight: 600;
        }

        .btn-primary {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .btn-primary:hover {
            background-color: #218838;
            border-color: #1e7e34;
        }

        .accordion .card-header {
            padding: 0;
        }

        .accordion .btn-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            padding: 1rem;
            width: 100%;
            text-align: left;
        }

        .accordion .btn-link:hover {
            background-color: var(--light-bg);
        }

        .chart-container {
            position: relative;
            min-height: 300px;
        }

        .navbar {
            background-color: var(--primary-color) !important;
            color: white;
        }

        .navbar-brand,
        .navbar .nav-link {
            color: white !important;
        }

        .table {
            border-collapse: separate;
            border-spacing: 0;
        }

        .table thead th {
            background-color: var(--table-header-bg);
            color: white;
            border-color: #454d55;
        }

        .status-indicator {
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
        }

        .status-present {
            background-color: var(--success-color);
            color: white;
        }

        .status-absent {
            background-color: var(--danger-color);
            color: white;
        }

        .badge-success {
            background-color: var(--success-color);
            color: white;
        }

        .badge-warning {
            background-color: var(--warning-color);
            color: #212529;
        }

        .badge-danger {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-success {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        @media print {
            .no-print {
                display: none;
            }
        }

        .table td {
            vertical-align: middle;
        }

        .table td small {
            display: block;
            color: var(--secondary-color);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Attendance System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'attendance_report' %}">Attendance Report</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'timetable' %}">Timetable</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'profile' %}">Profile</a>
                    </li>
                    <li class="nav-item">
                        <form method="post" action="{% url 'logout' %}" style="display:inline;">
                            {% csrf_token %}
                            <button type="submit" class="nav-link btn btn-link" style="padding:0; border:none; background:none;">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    {% endif %}

    {% block content %}{% endblock %}

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- This line is CRUCIAL for face_capture.js and similar blocks -->
    {% block extra_js %}{% endblock %}
</body>
</html>
